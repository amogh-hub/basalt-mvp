project:
  name: basalt-v3-production-candidate
  type: python
commands:
  install: null
  build: null
  lint: python -m basalt_proof.quality_check basalt_proof tests
  typecheck: null
  test: python tests/run_proof_matrix.py
proof:
  require_build: false
  require_lint: true
  require_typecheck: false
  require_tests: true
  mutation_sample: true
  mutation_max: 1
  mutation_per_file: 2
  mutation_test_command: python -m unittest tests.test_phase1_self_verification.ProofModelTests.test_failed_required_test_reduces_score
  mutation_include: basalt_proof/proof.py
  mutation_exclude: examples,basalt-demo-run
  security_scan: basic
  scan_exclude: examples/demo_policy_violation,basalt-demo-run
  min_verified_score: 80
  dashboard: true
  patch_plan: true
  pr_pack: true
policy:
  block_secrets: true
  block_destructive_migrations: true
  require_human_approval_for_deploy: true
sandbox:
  mode: auto
  docker_image: python:3.13-slim
  network: install-only
  fallback_to_temp: true
knowledge_graph:
  auto_refresh: true
  exclude: examples,basalt-demo-run
context:
  token_budget: 12000
agents:
  enabled: true
  max_files: 8
  max_changed_lines: 400
  max_attempts: 3
  require_human_approval_for_source: true
  allow_test_only_auto_apply: false
  protected_paths: .github/workflows,.env,infra,deploy
  allowed_roles: ImplementationAgent,BuilderAgent,FrontendAgent,BackendAgent,DatabaseAgent,TestingAgent,DevOpsAgent,DocumentationAgent
factory:
  enabled: true
  default_template: saas-starter
  supported_templates: python-service,api-service,fullstack-lite,web-app,saas-starter
  privacy_mode: local
  require_verified_assembly: true
  max_parallel_tasks: 4
  design_system: basalt-obsidian
private_beta:
  enabled: true
  storage: .basalt/private-beta
  default_job_attempts: 2
  default_workspace_network: deny
  require_verified_deployment_artifacts: true
  require_approval_for_staging: true
  require_approval_for_production: true
