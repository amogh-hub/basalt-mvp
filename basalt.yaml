project:
  name: basalt-v2.1-alpha
  type: python
commands:
  install: null
  build: null
  lint: python -m compileall basalt_proof tests
  typecheck: null
  test: python -m unittest discover -s tests -v
proof:
  require_build: false
  require_lint: true
  require_typecheck: false
  require_tests: true
  mutation_sample: true
  mutation_max: 1
  mutation_per_file: 2
  mutation_test_command: python -m unittest tests.test_phase1_self_verification.ProofModelTests.test_failed_required_test_reduces_score
  mutation_include: basalt_proof/proof.py
  mutation_exclude: examples,basalt-demo-run
  security_scan: basic
  scan_exclude: examples/demo_policy_violation,basalt-demo-run
  min_verified_score: 80
  dashboard: true
  patch_plan: true
  pr_pack: true
policy:
  block_secrets: true
  block_destructive_migrations: true
  require_human_approval_for_deploy: true
sandbox:
  mode: auto
  docker_image: python:3.13-slim
  network: install-only
  fallback_to_temp: true
knowledge_graph:
  auto_refresh: true
  exclude: examples,basalt-demo-run
context:
  token_budget: 12000
