name: Basalt Proof Gate

on:
  push:
    branches:
      - phase-1-v2-alpha
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proof:
    name: Basalt Proof Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Basalt
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run Basalt tests
        run: |
          python -m unittest discover -s tests -v

      - name: Run Basalt verification
        continue-on-error: true
        run: |
          basalt verify .

      - name: Enforce VERIFIED verdict
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          report_path = Path(".basalt/proof-report.json")

          if not report_path.exists():
              print("ERROR: Basalt did not generate a proof report.")
              sys.exit(1)

          report = json.loads(
              report_path.read_text(encoding="utf-8")
          )

          status = report.get("final_status", "UNKNOWN")
          score = report.get("score", 0)
          mutations = report.get("mutations", [])
          findings = report.get("security_findings", [])

          survived = sum(
              1 for mutation in mutations
              if mutation.get("survived") is True
          )

          high_findings = sum(
              1 for finding in findings
              if str(finding.get("level", "")).upper() == "HIGH"
          )

          print(f"Basalt verdict: {status}")
          print(f"Proof score: {score}/100")
          print(f"Survived mutations: {survived}")
          print(f"High findings: {high_findings}")

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")

          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as summary:
                  summary.write("# Basalt Proof Report\n\n")
                  summary.write(f"- **Verdict:** `{status}`\n")
                  summary.write(f"- **Proof score:** `{score}/100`\n")
                  summary.write(
                      f"- **Survived mutations:** `{survived}`\n"
                  )
                  summary.write(
                      f"- **High findings:** `{high_findings}`\n"
                  )

          if status != "VERIFIED":
              print("ERROR: Repository is not VERIFIED.")
              sys.exit(1)

          print("Basalt Proof Gate passed.")
          PY

      - name: Upload Basalt proof artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: basalt-proof-${{ github.run_number }}
          path: .basalt/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14
