name: Basalt Proof Gate

on:
  push:
    branches:
      - phase-1-v2-alpha
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proof:
    name: Basalt Proof Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Basalt
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run Basalt tests
        run: |
          python -m unittest discover -s tests -v

      - name: Run Basalt verification
        run: |
          basalt verify .

      - name: Enforce VERIFIED verdict
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          report_path = Path(".basalt/proof-report.json")

          if not report_path.exists():
              print("ERROR: Basalt did not generate a proof report.")
              sys.exit(1)

          report = json.loads(
              report_path.read_text(encoding="utf-8")
          )

          status = report.get("final_status", "UNKNOWN")
          score = report.get("score", 0)

          print(f"Basalt verdict: {status}")
          print(f"Proof score: {score}/100")

          if status != "VERIFIED":
              print("ERROR: Repository is not VERIFIED.")
              sys.exit(1)

          print("Basalt Proof Gate passed.")
          PY
