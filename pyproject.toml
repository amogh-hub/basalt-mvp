[project]
name = "basalt-mvp"
version = "2.3.0a1"
description = "Basalt v2.3 Alpha Command Center Platform: a local truth-compression web app for repository proof, graph intelligence, governed transactions, approvals, impact, context, and audit evidence."
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
basalt = "basalt_proof.cli:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-data]
basalt_proof = ["webui/*.html", "webui/*.css", "webui/*.js"]
